<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Café Boutique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-container mx-auto position-relative min-vh-100 pb-5">
        <a href="../../index.html" class="btn-volver position-absolute top-0 start-0 mt-3 ms-3 z-3 text-decoration-none d-flex align-items-center">
            <i class="bi bi-arrow-left me-2"></i>
            <span class="small text-uppercase tracking-wide">Volver</span>
        </a>
        
        <header class="shop-header pb-3 mb-3">
            <div class="shop-cover">
                <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=1000&auto=format&fit=crop" alt="Interior Café" class="w-100 h-100 object-fit-cover">
            </div>
            <div class="px-4 text-center mt-3">
                <h1 class="font-serif color-espresso mb-1 fs-2 fw-bold">La Tostaduría</h1>
                <p class="text-muted-brown small mb-2">Cafetería de especialidad & pastelería artesanal.</p>
                <div class="d-flex justify-content-center align-items-center gap-2 small" style="color: var(--caramel);">
                    <i class="bi bi-geo-alt-fill"></i>
                    <span class="fw-medium">Palpalá, Jujuy</span>
                </div>
            </div>
        </header>

        <div class="px-4 mb-4">
            <div class="search-boutique d-flex align-items-center px-3 py-2 bg-white">
                <i class="bi bi-search color-mocha me-2"></i>
                <input type="text" id="search-input" placeholder="Buscar en el menú..." class="form-control border-0 bg-transparent shadow-none px-0">
            </div>
        </div>

        <div class="category-tabs d-flex px-4 mb-4 gap-4 overflow-x-auto no-scrollbar bg-latte z-2 pt-2">
            <span class="tab-item active" data-category="todos">Todos</span>
            <span class="tab-item" data-category="bebidas">Bebidas</span>
            <span class="tab-item" data-category="pasteleria">Pastelería</span>
            <span class="tab-item" data-category="brunch">Brunch</span>
            <span class="tab-item" data-category="granos">Granos</span>
        </div>

        <div class="px-4">
            <h2 class="font-serif color-espresso fs-5 mb-4 px-1" id="title-classics">Todas las Bebidas</h2>
            
            <div class="d-flex flex-column gap-3" id="menu-container">
            </div>
        </div>

        <!-- Footer Sutil y Centrado -->
        <footer class="text-center py-4 mt-5">
            <p class="footer-copyright mb-0">
                © 2026 Desarrollado por AAV Web Service <br class="d-block d-sm-none"> 
                <span class="d-none d-sm-inline">|</span> 
                <a href="mailto:arianavqzdev@gmail.com" class="footer-link text-decoration-none">arianavqzdev@gmail.com</a>
            </p>
        </footer>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
