<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Burger & Fast Food</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark-body">

    <main class="app-container mx-auto position-relative min-vh-100 pb-5">
        
        <header class="pt-5 pb-3 px-4 d-flex justify-content-between align-items-center bg-dark-header sticky-top z-3 shadow-sm">
            <!-- Botón de Volver al Portfolio -->
            <a href="../../index.html" class="btn-volver position-absolute top-0 start-0 mt-3 ms-3 z-3 text-decoration-none d-flex align-items-center">
                <i class="bi bi-arrow-left me-2"></i>
                <span class="small text-uppercase tracking-wide">Volver</span>
            </a>
            
            <!-- Contenedor del título empujado hacia abajo con mt-4 -->
            <div class="mt-4">
                <p class="text-accent mb-0 small fw-bold text-uppercase tracking-wide">Fuego & Sabor</p>
                <h1 class="font-black text-white mb-0 fs-2 text-uppercase">Urban Burger</h1>
            </div>
            
            <!-- Ícono alineado con el título (también con mt-4) -->
            <div class="brand-icon mt-4">
                <i class="bi bi-fire text-accent fs-3"></i>
            </div>
        </header>

        <div class="px-4 mb-4 mt-3">
            <div class="search-urban d-flex align-items-center px-3 py-2">
                <i class="bi bi-search text-muted-light me-2"></i>
                <input type="text" id="search-input" placeholder="Buscar mi antojo..." class="form-control border-0 bg-transparent shadow-none px-0 text-white">
            </div>
        </div>

        <div class="category-pills d-flex px-4 mb-4 gap-3 overflow-x-auto no-scrollbar">
            <button class="pill-btn active" data-category="todos">Todo</button>
            <button class="pill-btn" data-category="burgers">Burgers</button>
            <button class="pill-btn" data-category="pizzas">Pizzas</button>
            <button class="pill-btn" data-category="papas">Papas</button>
            <button class="pill-btn" data-category="bebidas">Bebidas</button>
        </div>

        <div class="px-4">
            <h2 class="font-black text-white fs-4 mb-3 text-uppercase" id="title-category">Menú Completo</h2>
            
            <div class="d-flex flex-column gap-4" id="menu-container">
                </div>
        </div>

        <button class="cart-floating-btn shadow-lg" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasCart" aria-controls="offcanvasCart">
            <i class="bi bi-bag-fill"></i>
            <span class="cart-badge" id="cart-count">0</span>
        </button>

        <div class="offcanvas offcanvas-end bg-dark-body text-white" tabindex="-1" id="offcanvasCart" aria-labelledby="offcanvasCartLabel">
            <div class="offcanvas-header border-bottom border-secondary">
                <h5 class="offcanvas-title font-black text-uppercase" id="offcanvasCartLabel"><i class="bi bi-cart me-2 text-accent"></i>Tu Pedido</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            
            <div class="offcanvas-body d-flex flex-column">
                
                <div id="cart-items" class="flex-grow-1 overflow-auto no-scrollbar">
                    <p class="text-muted-light text-center mt-5 small">El carrito está vacío.</p>
                </div>

                <div class="cart-footer mt-3 pt-3 border-top border-secondary">
                    
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="fs-5 fw-bold">Total:</span>
                        <span class="fs-4 font-black text-accent" id="cart-total">$0</span>
                    </div>

                    <div class="mb-3">
                        <input type="text" id="cliente-nombre" class="form-control urban-input mb-2" placeholder="Tu Nombre">
                        <input type="text" id="cliente-direccion" class="form-control urban-input mb-2" placeholder="Dirección de envío (o 'Retiro por local')">
                        <textarea id="cliente-notas" class="form-control urban-input" rows="2" placeholder="Notas (ej: Sin cebolla, pago en efectivo)"></textarea>
                    </div>

                    <button class="btn-whatsapp w-100 shadow" onclick="enviarPedidoWsp()">
                        <i class="bi bi-whatsapp me-2"></i> Enviar Pedido
                    </button>
                </div>
            </div>
        </div>

        <footer class="text-center py-4 mt-5 border-top border-secondary" style="border-color: rgba(255, 255, 255, 0.05) !important;">
            <p class="small text-muted-light mb-0" style="font-size: 0.75rem;">
                © 2026 Desarrollado por AAV Web Service | <a href="mailto:arianavqzdev@gmail.com" class="text-muted-light text-decoration-none">arianavqzdev@gmail.com</a>
            </p>
        </footer>
        
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
